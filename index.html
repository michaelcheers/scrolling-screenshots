<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Screen Capture Studio</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0c0e;
    --surface: #16161a;
    --surface-raised: #1e1e24;
    --border: #2a2a32;
    --text: #e8e6e3;
    --text-dim: #7f7f8a;
    --accent: #ff6b4a;
    --accent-glow: rgba(255, 107, 74, 0.15);
    --green: #4ae0a0;
    --green-glow: rgba(74, 224, 160, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Instrument Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .noise {
    position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  .app {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    min-height: 100vh;
  }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    display: flex; align-items: center; gap: 12px;
    font-family: 'DM Mono', monospace;
    font-size: 14px; font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .logo-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
    transition: all 0.3s;
  }

  .logo-dot.live {
    background: var(--green);
    box-shadow: 0 0 12px var(--green);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .counter {
    font-family: 'DM Mono', monospace;
    font-size: 13px; color: var(--text-dim);
    background: var(--surface);
    padding: 6px 14px; border-radius: 6px;
    border: 1px solid var(--border);
  }

  .main {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 32px;
    gap: 24px;
  }

  .preview-container {
    position: relative;
    width: 100%; max-width: 900px;
    aspect-ratio: 16/9;
    background: var(--surface);
    border-radius: 12px;
    border: 1px solid var(--border);
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }

  .preview-container video {
    width: 100%; height: 100%;
    object-fit: contain;
    display: none;
  }

  .placeholder {
    display: flex; flex-direction: column;
    align-items: center; gap: 20px;
    color: var(--text-dim);
  }

  .placeholder svg { opacity: 0.3; }

  .placeholder p {
    font-size: 14px;
    font-family: 'DM Mono', monospace;
  }

  .controls {
    display: flex; gap: 12px;
    align-items: center;
  }

  button {
    font-family: 'Instrument Sans', sans-serif;
    font-weight: 600; font-size: 14px;
    border: none; cursor: pointer;
    padding: 12px 28px;
    border-radius: 8px;
    display: flex; align-items: center; gap: 8px;
    transition: all 0.2s;
  }

  .btn-share {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 0 20px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,0.15);
  }
  .btn-share:hover { transform: translateY(-1px); box-shadow: 0 4px 24px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,0.15); }
  .btn-share:active { transform: translateY(0); }

  .btn-capture {
    background: var(--surface-raised);
    color: var(--text);
    border: 1px solid var(--border);
    display: none;
  }
  .btn-capture:hover { background: #26262e; border-color: #3a3a44; }
  .btn-capture:active { transform: scale(0.98); }

  .btn-done {
    background: var(--green);
    color: #0c0c0e;
    display: none;
    box-shadow: 0 0 20px var(--green-glow);
  }
  .btn-done:hover { transform: translateY(-1px); box-shadow: 0 4px 24px var(--green-glow); }

  .btn-stop {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    padding: 12px 20px;
    display: none;
  }
  .btn-stop:hover { color: var(--accent); border-color: var(--accent); }

  .gallery {
    width: 100%; max-width: 900px;
    display: none;
  }

  .gallery-label {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    margin-bottom: 12px;
    padding-left: 4px;
  }

  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 10px;
  }

  .thumb {
    position: relative;
    aspect-ratio: 16/10;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.2s;
    animation: thumbIn 0.3s ease-out;
  }

  @keyframes thumbIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  .thumb:hover {
    border-color: var(--accent);
    transform: scale(1.03);
  }

  .thumb img { width: 100%; height: 100%; object-fit: cover; }

  .thumb-number {
    position: absolute; top: 6px; left: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    background: rgba(0,0,0,0.7);
    color: var(--text);
    padding: 2px 7px;
    border-radius: 4px;
    backdrop-filter: blur(4px);
  }

  .thumb-remove {
    position: absolute; top: 5px; right: 5px;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: rgba(0,0,0,0.7);
    color: var(--text-dim);
    border: none;
    cursor: pointer;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transition: opacity 0.15s;
    backdrop-filter: blur(4px);
  }
  .thumb:hover .thumb-remove { opacity: 1; }
  .thumb-remove:hover { color: var(--accent); }

  .flash {
    position: fixed; inset: 0;
    background: white;
    z-index: 999;
    animation: flash 0.15s ease-out forwards;
    pointer-events: none;
  }
  @keyframes flash {
    from { opacity: 0.5; }
    to { opacity: 0; }
  }

  /* Lightbox */
  .lightbox {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.9);
    z-index: 100;
    align-items: center; justify-content: center;
    cursor: zoom-out;
    backdrop-filter: blur(8px);
  }
  .lightbox.open { display: flex; }
  .lightbox img {
    max-width: 92vw; max-height: 92vh;
    border-radius: 8px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
</style>
</head>
<body>
<div class="noise"></div>
<div class="app">
  <header>
    <div class="logo">
      <div class="logo-dot" id="statusDot"></div>
      <span>Screen Capture</span>
    </div>
    <div class="counter" id="counter">0 captures</div>
  </header>

  <div class="main">
    <div class="preview-container">
      <video id="video" autoplay muted></video>
      <div class="placeholder" id="placeholder">
        <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <path d="M8 21h8M12 17v4"/>
        </svg>
        <p>No screen shared yet</p>
      </div>
    </div>

    <div class="controls">
      <button class="btn-share" id="btnShare" onclick="startShare()">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
        Share Screen
      </button>
      <button class="btn-capture" id="btnCapture" onclick="takeScreenshot()">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4" fill="currentColor"/></svg>
        Capture
      </button>
      <button class="btn-done" id="btnDone" onclick="downloadAll()">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
        Download All
      </button>
      <button class="btn-stop" id="btnStop" onclick="stopShare()">Stop</button>
    </div>

    <div class="gallery" id="gallery">
      <div class="gallery-label">Screenshots</div>
      <div class="gallery-grid" id="galleryGrid"></div>
    </div>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="this.classList.remove('open')">
  <img id="lightboxImg" src="" alt="Screenshot preview">
</div>

<script>
  const video = document.getElementById('video');
  const placeholder = document.getElementById('placeholder');
  const btnShare = document.getElementById('btnShare');
  const btnCapture = document.getElementById('btnCapture');
  const btnDone = document.getElementById('btnDone');
  const btnStop = document.getElementById('btnStop');
  const gallery = document.getElementById('gallery');
  const galleryGrid = document.getElementById('galleryGrid');
  const counter = document.getElementById('counter');
  const statusDot = document.getElementById('statusDot');

  let screenshots = [];
  let stream = null;

  async function startShare() {
    try {
      stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
      video.srcObject = stream;
      video.style.display = 'block';
      placeholder.style.display = 'none';
      btnShare.style.display = 'none';
      btnCapture.style.display = 'flex';
      btnStop.style.display = 'flex';
      statusDot.classList.add('live');

      stream.getVideoTracks()[0].addEventListener('ended', () => stopShare());
    } catch (e) {
      // User cancelled
    }
  }

  function stopShare() {
    if (stream) {
      stream.getTracks().forEach(t => t.stop());
      stream = null;
    }
    video.srcObject = null;
    video.style.display = 'none';
    placeholder.style.display = 'flex';
    btnCapture.style.display = 'none';
    btnStop.style.display = 'none';
    btnShare.style.display = 'flex';
    statusDot.classList.remove('live');
  }

  function takeScreenshot() {
    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    const dataUrl = canvas.toDataURL('image/png');
    screenshots.push(dataUrl);
    updateGallery();

    // Flash effect
    const flash = document.createElement('div');
    flash.className = 'flash';
    document.body.appendChild(flash);
    flash.addEventListener('animationend', () => flash.remove());
  }

  function removeScreenshot(index) {
    screenshots.splice(index, 1);
    updateGallery();
  }

  function updateGallery() {
    const n = screenshots.length;
    counter.textContent = n + (n === 1 ? ' capture' : ' captures');
    gallery.style.display = n > 0 ? 'block' : 'none';
    btnDone.style.display = n > 0 ? 'flex' : 'none';

    galleryGrid.innerHTML = '';
    screenshots.forEach((src, i) => {
      const thumb = document.createElement('div');
      thumb.className = 'thumb';
      thumb.innerHTML = `
        <img src="${src}" alt="Screenshot ${i + 1}">
        <span class="thumb-number">${i + 1}</span>
        <button class="thumb-remove" onclick="event.stopPropagation(); removeScreenshot(${i})">×</button>
      `;
      thumb.addEventListener('click', () => {
        document.getElementById('lightboxImg').src = src;
        document.getElementById('lightbox').classList.add('open');
      });
      galleryGrid.appendChild(thumb);
    });
  }

  async function downloadAll() {
    try {
      const dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
      for (let i = 0; i < screenshots.length; i++) {
        const byteString = atob(screenshots[i].split(',')[1]);
        const ab = new ArrayBuffer(byteString.length);
        const ia = new Uint8Array(ab);
        for (let j = 0; j < byteString.length; j++) ia[j] = byteString.charCodeAt(j);
        const blob = new Blob([ab], { type: 'image/png' });
        const fileHandle = await dirHandle.getFileHandle(`screenshot-${String(i + 1).padStart(3, '0')}.png`, { create: true });
        const writable = await fileHandle.createWritable();
        await writable.write(blob);
        await writable.close();
      }
    } catch (e) {
      if (e.name !== 'AbortError') {
        alert('Download error: ' + e.name + ' - ' + e.message);
      }
    }
  }

  // Keyboard shortcut
  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space' && stream) {
      e.preventDefault();
      takeScreenshot();
    }
  });
</script>
</body>
</html>
